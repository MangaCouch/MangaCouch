# Alembic configuration for MangaCouch.
#
# At runtime MangaCouch creates the schema with SQLAlchemy's create_all (an embedded, single-file
# app needs no migration step on a fresh database). Alembic is provided for *evolving* the schema
# across released versions. The database URL is injected at runtime from config.toml by env.py, so
# the static value below is only a placeholder for offline ``alembic`` invocations.

[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os
sqlalchemy.url = sqlite:///database/library.sqlite

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
