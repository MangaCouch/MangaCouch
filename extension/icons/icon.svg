<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="MangaCouch">
  <!-- Rounded background -->
  <rect width="128" height="128" rx="26" fill="#1e1f24"/>
  <!-- Couch body -->
  <g fill="#c2410c">
    <!-- back rest -->
    <rect x="24" y="44" width="80" height="26" rx="8"/>
    <!-- seat cushion -->
    <rect x="20" y="64" width="88" height="22" rx="9"/>
    <!-- left arm -->
    <rect x="18" y="56" width="16" height="34" rx="7"/>
    <!-- right arm -->
    <rect x="94" y="56" width="16" height="34" rx="7"/>
    <!-- legs -->
    <rect x="28" y="88" width="8" height="12" rx="2"/>
    <rect x="92" y="88" width="8" height="12" rx="2"/>
  </g>
  <!-- Download arrow tucked above the couch -->
  <g fill="#e8e8ea">
    <rect x="59" y="20" width="10" height="18" rx="3"/>
    <path d="M50 34 L64 50 L78 34 Z"/>
  </g>
</svg>
